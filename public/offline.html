<!DOCTYPE html>
<html lang="es" style="background-color:#0a0a0f">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>StreamShare</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{background:#0a0a0f;height:100%}
  body{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;
    padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom);
    font-family:-apple-system,system-ui,sans-serif;color:#fff}
  svg{width:56px;height:56px}
  .bar{width:48px;height:3px;border-radius:2px;background:rgba(249,115,22,.15);overflow:hidden;position:relative}
  .bar::after{content:'';position:absolute;inset:0;width:40%;border-radius:2px;background:#f97316;animation:s 1s ease-in-out infinite}
  @keyframes s{0%{transform:translateX(-100%)}50%{transform:translateX(200%)}100%{transform:translateX(-100%)}}
  .msg{margin-top:16px;font-size:13px;color:#737373;text-align:center}
</style>
</head>
<body>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="#f97316">
  <path d="M14 3h-4C6.229 3 4.343 3 3.172 4.172S2 7.229 2 11s0 5.657 1.172 6.828S6.229 19 10 19h4c3.771 0 5.657 0 6.828-1.172S22 14.771 22 11s0-5.657-1.172-6.828S17.771 3 14 3" opacity="0.5"/>
  <path d="M9.95 16.05c.93-.93 1.396-1.396 1.97-1.427q.08-.003.159 0c.574.03 1.04.496 1.971 1.427c2.026 2.026 3.039 3.039 2.755 3.913a1.5 1.5 0 0 1-.09.218C16.297 21 14.865 21 12 21s-4.298 0-4.715-.819a1.5 1.5 0 0 1-.09-.218c-.284-.874.729-1.887 2.755-3.913"/>
</svg>
<div class="bar"></div>
<p class="msg">Cargando...</p>
<script>
// Auto-reload when connection comes back
window.addEventListener('online', function() { window.location.reload(); });
// Also retry periodically
setInterval(function() {
  fetch(window.location.href, { method: 'HEAD', cache: 'no-store' })
    .then(function(r) { if (r.ok) window.location.reload(); })
    .catch(function() {});
}, 3000);
</script>
</body>
</html>
